<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Paige Ingram Portfolio</title>
</head>
<body>
    <section class="showcase">
        <header>
            <h2 class="logo">PAIGE INGRAM</h2>
            <div class="toggle"></div> <!--change this back to not active-->
        </header>
        <video src="tech-background.mp4" muted loop autoplay></video>
        <div class="overlay"></div>
        <div class="text">
            <h2>Welcome</h2>
            <h3>To My Portfolio</h3>
            <p>Learn about Paige :)</p>
            <a href="#">Explore</a>
        </div>
        <ul class="social">
            <li><a href="#"><img src="static/linkedin.png" alt="" height="320"></a></li>
            <li><a href="#"><img src="static/github.jpeg" alt=""></a></li>
        </ul>
    </section>

    <div class="menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Education</a></li>
            <li><a href="#">Experience</a></li>
            <li><a href="#">Projects</a></li>

        </ul>
    </div>
    <script>
        const menuToggle = document.querySelector(".toggle")
        const showcase = document.querySelector(".showcase")

        menuToggle.addEventListener("click", () => {
            menuToggle.classList.toggle("active")
            showcase.classList.toggle("active")
        })
    </script>
</body>
</html>
